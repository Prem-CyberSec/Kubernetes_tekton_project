apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
    spec:
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: payment
        image:951296734763.dkr.ecr.us-east-1.amazonaws.com/k8s-service/api-service:latest
        ports:
        - containerPort: 5001

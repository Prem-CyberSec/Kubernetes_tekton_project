apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      imagePullSecrets: 
      - name: ecr-secret 
      containers:
      - name: auth
        image:951296734763.dkr.ecr.us-east-1.amazonaws.com/k8s-service/auth-service:latest
        ports:
        - containerPort: 5000

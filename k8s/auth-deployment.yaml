apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
      - name: auth
        image: 643327307650.dkr.ecr.us-east-1.amazonaws.com/k8s-services/repo/auth-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000

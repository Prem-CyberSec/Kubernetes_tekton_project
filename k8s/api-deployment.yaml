apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: 643327307650.dkr.ecr.us-east-1.amazonaws.com/k8s-services/repo/api-service:latest
        imagePullPolicy: Never 
        ports:
        - containerPort: 5002
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: dev
spec:
  type: NodePort
  selector:
    app: api
  ports:
    - port: 5002
      targetPort: 5002
      nodePort: 30008

